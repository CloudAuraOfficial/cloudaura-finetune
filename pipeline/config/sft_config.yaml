# SFT with QLoRA Configuration
# Designed for Google Colab T4 (16GB VRAM)

model:
  base_model: "Qwen/Qwen2.5-1.5B-Instruct"
  torch_dtype: "bfloat16"
  attn_implementation: "flash_attention_2"

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_use_double_quant: true

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  task_type: "CAUSAL_LM"
  bias: "none"

training:
  num_train_epochs: 3
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.1
  lr_scheduler_type: "cosine"
  max_seq_length: 1024
  logging_steps: 10
  eval_steps: 100
  save_steps: 200
  save_total_limit: 3
  bf16: true
  gradient_checkpointing: true
  optim: "paged_adamw_8bit"
  report_to: "none"

data:
  sft_dataset: "HuggingFaceH4/ultrachat_200k"
  sft_split: "train_sft"
  eval_split: "test_sft"
  max_train_samples: 10000
  max_eval_samples: 500

output:
  output_dir: "./outputs/sft"
  adapter_dir: "./outputs/sft/final_adapter"
